<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="244" cy="386" r="94" fill="#f57c00" opacity="0.12"/>
    <circle cx="497" cy="643" r="61" fill="#f57c00" opacity="0.05"/>
    <circle cx="578" cy="377" r="86" fill="#f57c00" opacity="0.19"/>
    <circle cx="56" cy="522" r="85" fill="#f57c00" opacity="0.10"/>
    <circle cx="629" cy="49" r="55" fill="#f57c00" opacity="0.13"/>
    <circle cx="34" cy="284" r="33" fill="#f57c00" opacity="0.17"/>
    <rect x="937" y="654" width="34" height="35" rx="8" fill="#e65100" opacity="0.07" transform="rotate(9, 714, 328)"/>
    <rect x="1257" y="496" width="74" height="37" rx="8" fill="#e65100" opacity="0.11" transform="rotate(42, 317, 78)"/>
    <rect x="186" y="393" width="76" height="79" rx="8" fill="#e65100" opacity="0.14" transform="rotate(1, 628, 605)"/>
    <rect x="1106" y="562" width="76" height="85" rx="8" fill="#e65100" opacity="0.05" transform="rotate(0, 561, 10)"/>
    <rect x="399" y="696" width="79" height="24" rx="8" fill="#e65100" opacity="0.09" transform="rotate(40, 1234, 383)"/>
    <rect x="328" y="224" width="93" height="51" rx="8" fill="#e65100" opacity="0.09" transform="rotate(17, 90, 524)"/>
    <rect x="833" y="-67" width="27" height="28" rx="8" fill="#e65100" opacity="0.13" transform="rotate(7, 1264, 278)"/>
    <rect x="665" y="291" width="26" height="32" rx="8" fill="#e65100" opacity="0.06" transform="rotate(27, 717, 376)"/>
    <polygon points="24,86 119,276 -71,276" fill="#f57c00" opacity="0.10"/>
    <polygon points="725,114 776,216 674,216" fill="#f57c00" opacity="0.13"/>
    <polygon points="770,571 798,627 742,627" fill="#f57c00" opacity="0.03"/>
    <polygon points="307,116 360,222 254,222" fill="#f57c00" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,534 C360,582 840,486 1200,534 L1200,630 L0,630Z" fill="#f57c00" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Okinawa resort 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Okinawa — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffcc80" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffcc80" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Okinawa Okinawa resort 안내 — 정보
  </text>
</svg>